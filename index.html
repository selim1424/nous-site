<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOUS</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
    }

    .background {
      position: absolute;
      inset: 0;
      background: url('background.jpg') no-repeat center center;
      background-size: cover;
      transform: scale(1.03);
      z-index: 0;
    }

    .background::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom, rgba(0,0,0,0.38), rgba(0,0,0,0.72)),
        linear-gradient(to right, rgba(0,0,0,0.35), rgba(0,0,0,0.10), rgba(0,0,0,0.45));
    }

    .fog {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(circle at 18% 32%, rgba(255,255,255,0.10), transparent 28%),
        radial-gradient(circle at 78% 36%, rgba(255,255,255,0.08), transparent 30%),
        radial-gradient(circle at 55% 78%, rgba(255,255,255,0.07), transparent 32%);
      filter: blur(38px);
      animation: fogMove 12s ease-in-out infinite alternate;
    }

    @keyframes fogMove {
      from {
        transform: translateX(-18px) translateY(0);
      }
      to {
        transform: translateX(18px) translateY(-6px);
      }
    }

    .content {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px 20px;
    }

    .box {
      width: 100%;
      max-width: 980px;
    }

    .logo {
      display: block;
      width: min(560px, 78vw);
      max-width: 100%;
      height: auto;
      margin: 0 auto 22px auto;
      filter: drop-shadow(0 8px 24px rgba(0,0,0,0.35));
    }

    .soon {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(30px, 4vw, 52px);
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 16px;
      color: rgba(255,255,255,0.96);
      text-shadow: 0 3px 18px rgba(0,0,0,0.35);
    }

    .question {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(21px, 2vw, 30px);
      font-weight: 400;
      margin-bottom: 16px;
      color: rgba(255,255,255,0.94);
      text-shadow: 0 3px 16px rgba(0,0,0,0.30);
    }

    .question .brand-word {
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 700;
    }

    .desc {
      max-width: 760px;
      margin: 0 auto;
      font-size: clamp(15px, 1.3vw, 18px);
      line-height: 1.8;
      color: rgba(255,255,255,0.84);
      text-shadow: 0 2px 12px rgba(0,0,0,0.28);
    }

    .desc strong {
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    @media (max-width: 768px) {
      .logo {
        width: 84vw;
        margin-bottom: 18px;
      }

      .soon {
        letter-spacing: 2px;
        margin-bottom: 12px;
      }

      .question {
        margin-bottom: 12px;
      }

      .desc {
        line-height: 1.7;
        padding: 0 6px;
      }
    }
  </style>
</head>
<body>
  <div class="background"></div>
  <div class="fog"></div>

  <main class="content">
    <div class="box">
      <img src="logo.png" alt="NOUS" class="logo">

      <div class="soon">Bientôt</div>

      <div class="question">Qui sommes-<span class="brand-word">NOUS</span> ?</div>

      <p class="desc">
        Ce n’est que le début.<br>
        Une silhouette dans l’ombre. Une identité en marche.<br>
        <strong>NOUS</strong> arrive bientôt.
      </p>
    </div>
  </main>
</body>
</html>
